<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{TITLE}}</title>
  <style>
    @media only screen and (max-width: 640px) {
      .email-shell { width: 100% !important; }
      .email-body { padding: 28px 20px 32px !important; }
      .headline { font-size: 27px !important; line-height: 1.35 !important; }
      .hero-image { border-radius: 14px !important; }
      .brand-row { padding: 22px 20px !important; }
    }
  </style>
</head>
<body style="margin:0;padding:0;background:#f3eee5;color:#151515;font-family:'Apple SD Gothic Neo','Malgun Gothic',Arial,sans-serif;">
  <div style="display:none;max-height:0;overflow:hidden;opacity:0;color:transparent;">{{SUMMARY}}</div>
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="width:100%;margin:0;padding:0;background:#f3eee5;">
    <tr>
      <td align="center" style="padding:28px 12px;">
        <table class="email-shell" role="presentation" width="620" cellpadding="0" cellspacing="0" border="0" style="width:620px;max-width:100%;background:#fffaf2;border:1px solid #e7e0d6;">
          <tr>
            <td class="brand-row" style="padding:26px 34px 22px;background:#102033;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td style="font-family:Georgia,'Times New Roman','Noto Serif KR',serif;font-size:19px;font-weight:700;letter-spacing:-0.3px;color:#ffffff;">대한민국 공익정책 브리프</td>
                  <td align="right" style="font-size:10px;font-weight:700;letter-spacing:1.5px;color:#e7c585;">4TENLAB VIKI</td>
                </tr>
              </table>
            </td>
          </tr>
          <tr>
            <td style="height:4px;background:#9b6b24;font-size:0;line-height:0;">&nbsp;</td>
          </tr>
          <tr>
            <td class="email-body" style="padding:36px 34px 40px;">
              <p style="margin:0 0 12px;color:#9b6b24;font-size:11px;font-weight:700;letter-spacing:1.4px;line-height:1.5;">PUBLIC BENEFIT BRIEF · {{PUBLISHED_DATE}}</p>
              <h1 class="headline" style="margin:0 0 18px;color:#102033;font-family:Georgia,'Times New Roman','Noto Serif KR',serif;font-size:33px;font-weight:700;letter-spacing:-1px;line-height:1.32;word-break:keep-all;">{{TITLE}}</h1>
              <p style="margin:0 0 25px;color:#4a4a4a;font-size:16px;line-height:1.8;word-break:keep-all;">{{SUMMARY}}</p>
              <a href="{{URL}}" style="display:block;text-decoration:none;">
                <img class="hero-image" src="{{THUMBNAIL_URL}}" alt="{{TITLE}} 대표 이미지" width="552" style="display:block;width:100%;height:auto;border:0;border-radius:18px;background:#e7e0d6;" />
              </a>
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-top:28px;">
                <tr>
                  <td style="border-top:1px solid #e7e0d6;padding-top:24px;">
                    <p style="margin:0 0 18px;color:#666666;font-size:13px;line-height:1.7;">정책의 대상·기간·이용 방법은 변동될 수 있으므로, 글 안의 공식 출처에서 최종 내용을 확인해 주세요.</p>
                    <a href="{{URL}}" style="display:inline-block;padding:13px 20px;background:#102033;border:1px solid #102033;color:#ffffff;font-size:14px;font-weight:700;line-height:1;text-decoration:none;">브리프 읽기&nbsp; →</a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <tr>
            <td style="padding:22px 34px 25px;border-top:1px solid #e7e0d6;background:#fffdf8;">
              <p style="margin:0;color:#777777;font-size:11px;line-height:1.65;">본 메일은 4TENLAB의 내부 뉴스레터 발송 테스트입니다.</p>
              <p style="margin:5px 0 0;color:#777777;font-size:11px;line-height:1.65;">대한민국 공익정책 브리프 · 공식 출처 기반 시민 안내</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
