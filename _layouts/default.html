<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta property="og:title" content="{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta property="og:type" content="website">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="{{ '/' | relative_url }}">대한민국 공익정책 브리프</a>
    <nav><a href="{{ '/' | relative_url }}#latest">최신 글</a><a href="{{ '/editorial-principles/' | relative_url }}">편집 원칙</a></nav>
  </header>
  <main class="container">{{ content }}</main>
  <footer class="site-footer"><p>공식 출처 확인을 우선하는 공익 정보 아카이브 · Korea Public Benefit Brief</p></footer>
</body>
</html>
