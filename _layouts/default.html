<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title and page.title != site.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  {% if site.google_site_verification %}<meta name="google-site-verification" content="{{ site.google_site_verification | escape }}">{% endif %}
  {% if site.naver_site_verification %}<meta name="naver-site-verification" content="{{ site.naver_site_verification | escape }}">{% endif %}
  <link rel="canonical" href="{{ page.url | absolute_url }}">
  <meta property="og:title" content="{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
  {% if page.image %}
  <meta property="og:image" content="{{ page.image | absolute_url }}">
  <meta property="og:image:alt" content="{{ page.image_alt | default: page.title }}">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="{{ page.image | absolute_url }}">
  {% endif %}
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <script type="application/ld+json">
  {"@context":"https://schema.org","@type":"WebSite","name":"정책과 시민","alternateName":"Korea Public Benefit Brief","url":"{{ '/' | absolute_url }}","inLanguage":"ko-KR","description":"정책이 시민의 삶에 닿는 순간을 공식 출처로 확인하고 설명하는 공익정책 브리프"}
  </script>
</head>
<body>
  <header class="site-header">
    <a class="brand" href="{{ '/' | relative_url }}">정책과 시민 <small>Korea Public Benefit Brief</small></a>
    <nav aria-label="주요 메뉴"><a href="{{ '/' | relative_url }}">홈</a><a class="nav-pill" href="{{ '/#latest' | relative_url }}">포스팅</a><a href="{{ '/about/' | relative_url }}">소개</a><a href="{{ '/feed.xml' | relative_url }}">RSS</a></nav>
  </header>
  <main class="container">{{ content }}</main>
  <footer class="site-footer"><p>정책이 시민의 삶에 닿는 순간을 공식 출처로 확인합니다 · Korea Public Benefit Brief</p></footer>
</body>
</html>
