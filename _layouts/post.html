---
layout: default
---
<article class="article">
  <p class="eyebrow">POLICY BRIEF</p>
  <h1>{{ page.title }}</h1>
  <p class="meta">{{ page.date | date: "%Y.%m.%d" }} · {{ page.author }}</p>
  {% if page.image %}
  <figure class="post-thumbnail">
    <img src="{{ page.image | relative_url }}" alt="{{ page.image_alt | default: page.title }}" loading="eager">
  </figure>
  {% endif %}
  {{ content }}
</article>
